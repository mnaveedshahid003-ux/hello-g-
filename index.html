<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Scan</title>
<style>
    body {
        background: black;
        color: lime;
        font-family: monospace;
        padding: 10px;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #terminal {
        white-space: pre-line;
        font-size: 20px;
        width: 100%;
    }
    .centered {
        text-align: center;
        line-height: 1.5;
    }
    .eid-text {
        font-size: 60px;
        font-weight: bold;
    }
    button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        background: red;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 18px;
    }
</style>
</head>
<body>

<div id="terminal"></div>
<button onclick="startPrank()">Click to Continue</button>

<audio id="eidSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>
const terminal = document.getElementById("terminal");
const sound = document.getElementById("eidSound");

const messages = [
    "⚠️ SYSTEM BREACH DETECTED ⚠️",
    "Scanning Your Mobile...",
    "Transferring Your Files...",
    "Transferring Your Passwords...",
    "Extracting personal files...",
    "Uploading passwords to server...",
    "Tracking location...",
    "Your Data Transfer Complete...",
    "Thanks For Cooperation 😈..."
];

let i = 0;

function startPrank() {
    document.querySelector("button").style.display = "none";
    openFullscreen();
    typeMessage();
}

function typeMessage() {
    if (i < messages.length) {
        terminal.innerHTML += messages[i] + "\n";
        i++;
        setTimeout(typeMessage, 900);
    } else {
        setTimeout(showPrank, 1500);
    }
}

function showPrank() {
    document.body.style.background = "black";
    terminal.classList.add("centered");
    terminal.innerHTML = "<div class='eid-text'>🎉 EID MUBARAK 🎉<br>My Love My Honey Marij😘😘😘</div>";
    terminal.style.color = "gold";

    // ensure sound plays after user interaction
    sound.currentTime = 0;
    sound.play().catch(() => {});
}

function openFullscreen() {
    let elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }
}
</script>

</body>
</html>
