<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Hacker Prank Ultra Pro</title>

<style>

body{
margin:0;
background:black;
font-family:monospace;
overflow:hidden;
}

#eid{
position:fixed;
top:25%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#ff9900;
font-weight:bold;
text-align:center;
}

#options{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
flex-direction:column;
gap:20px;
align-items:center;
}

.optionBtn{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:12px;
background:#ff9900;
color:white;
cursor:pointer;
}

#prankScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(#000,#111);
color:#39ff14;
display:none;
flex-direction:column;
padding:20px;
font-size:20px;
overflow-y:auto;
}

.flicker{
animation:flicker 0.2s infinite;
}

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.6}
100%{opacity:1}
}

#flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

</style>
</head>

<body>

<div id="eid">🎉 Eid Mubarak 🎉</div>

<div id="options">

<div>
Select connection<br>
<button class="optionBtn" data-connection="WiFi">WiFi</button>
<button class="optionBtn" data-connection="Mobile Data">Mobile Data</button>
</div>

<div>
Select device<br>
<button class="optionBtn" data-device="iPhone">iPhone</button>
<button class="optionBtn" data-device="Android">Android</button>
<button class="optionBtn" data-device="System">System</button>
</div>

</div>

<div id="prankScreen"></div>
<div id="flash"></div>

<script>

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}

function shutter(){
new Audio("https://actions.google.com/sounds/v1/camera/camera_shutter.ogg").play();
}

function siren(){
new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg").play();
}

function flash(){

let f=document.getElementById("flash");

f.style.opacity="1";

setTimeout(()=>{
f.style.opacity="0";
},150);

}

function typeLine(container,text,speed=35){

let line=document.createElement("div");
line.classList.add("flicker");
container.appendChild(line);

let i=0;

let t=setInterval(()=>{

line.textContent+=text[i];
i++;

if(i>=text.length){
clearInterval(t);
}

container.scrollTop=container.scrollHeight;

},speed);

}

function startPrank(connection,device){

document.getElementById("eid").style.display="none";
document.getElementById("options").style.display="none";

let screen=document.getElementById("prankScreen");

screen.style.display="flex";

if(device==="Android" || device==="iPhone"){
screen.style.fontSize="26px";
}

let ip=`192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;

let lat=(29 + Math.random()).toFixed(4);
let lon=(71 + Math.random()).toFixed(4);

let messages=[

`Connection type: ${connection}`,
`Device detected: ${device}`,
`Scanning network ports...`,
`Signal strength ▂▄▆█`,
`Fetching IP address: ${ip}`,
`Locating GPS coordinates...`,
`Latitude: ${lat}`,
`Longitude: ${lon}`,
`Location: Bahawalpur, Punjab, Pakistan`,
`Bypassing firewall security...`,
`Injecting exploit payload...`,
`Opening secure socket tunnel...`,
`Accessing device storage...`,
`Accessing camera module...`,
`Camera accessed successfully`,
`Capturing screenshot...`,
`Encrypting sensitive files...`,
`Preparing remote transfer channel...`

];

let delay=0;

messages.forEach(msg=>{

setTimeout(()=>{

if(msg.includes("Capturing")){
shutter();
flash();
}
else{
beep();
}

typeLine(screen,msg);

},delay);

delay+=1200;

});

setTimeout(()=>{

let line=document.createElement("div");
screen.appendChild(line);

let progress=0;

let loading=setInterval(()=>{

progress+=1;

let bar="█".repeat(progress/5)+" ".repeat(20-progress/5);

line.textContent=`Data transfer: [${bar}] ${progress}%`;

screen.scrollTop=screen.scrollHeight;

if(progress>=100){

clearInterval(loading);

siren();

typeLine(screen,"Uploading private media...");
typeLine(screen,"Extracting encrypted messages...");
typeLine(screen,"Synchronizing remote database...");
typeLine(screen,"All systems operational");

}

},300); // ≈30 seconds

},delay);

}

function showOptions(){

document.getElementById("eid").style.display="none";
document.getElementById("options").style.display="flex";

}

let connection=null;
let device=null;

document.querySelectorAll(".optionBtn").forEach(btn=>{

btn.onclick=()=>{

if(btn.dataset.connection) connection=btn.dataset.connection;
if(btn.dataset.device) device=btn.dataset.device;

if(connection && device){
startPrank(connection,device);
}

}

});

setTimeout(showOptions,3000);

</script>

</body>
</html>
